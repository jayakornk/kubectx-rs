version: 2
updates:
  # Keep Cargo dependencies current and surface vulnerability PRs for the Rust ecosystem.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Keep the GitHub Actions used in workflows current (security + version bumps).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5