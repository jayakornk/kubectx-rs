name: release

# Builds precompiled `kubectx` + `kubens` binaries for macOS (arm64/x86_64)
# and Linux (x86_64/arm64) and attaches them to a GitHub Release.
#
# Triggers:
#   - pushing a `v*` tag (normal release path), or
#   - manual run via "Run workflow" with a tag input (used to (re)build an
#     already-pushed tag, e.g. back-filling v0.1.0 after this workflow was added).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify Cargo.toml version == tag
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve ref + tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            REF="refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
            REF="${GITHUB_REF}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Compare Cargo.toml version to tag
        env:
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          EXPECTED="${TAG#v}"
          ACTUAL=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          echo "tag (without v): ${EXPECTED}"
          echo "Cargo.toml version: ${ACTUAL}"
          if [ "${EXPECTED}" != "${ACTUAL}" ]; then
            echo "::error::Version mismatch: tag '${TAG}' expects Cargo.toml version '${EXPECTED}', but Cargo.toml says '${ACTUAL}'. Bump Cargo.toml's version (e.g. via 'cargo release') to match the tag before tagging."
            exit 1
          fi
          echo "Versions match"

  test:
    name: Test + fmt (release gate)
    needs: [verify-version]
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve ref + tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            REF="refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
            REF="${GITHUB_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo test --locked
        run: cargo test --locked

  security:
    name: Security audit (release gate)
    needs: [verify-version]
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="refs/tags/${{ inputs.tag }}"
          else
            REF="${GITHUB_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit --deny warnings

  build:
    name: Build ${{ matrix.target }}
    needs: [test, security]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            cross_linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
    steps:
      - name: Resolve ref + tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            REF="refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
            REF="${GITHUB_REF}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross toolchain
        if: ${{ matrix.apt_packages != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build (release, locked)
        # Triple-specific linker env: only read by the matching target job,
        # so an empty value on the other jobs is harmless.
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_linker }}
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binaries
        env:
          TAG: ${{ steps.ref.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${TAG#v}"
          STAGING="kubectx-rs-${VERSION}-${TARGET}"
          mkdir "${STAGING}"
          cp "target/${TARGET}/release/kubectx" "${STAGING}/"
          cp "target/${TARGET}/release/kubens" "${STAGING}/"
          tar -czf "${STAGING}.tar.gz" "${STAGING}"
          shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kubectx-rs-${{ env.VERSION }}-${{ matrix.target }}
          path: |
            kubectx-rs-*.tar.gz
            kubectx-rs-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            REF="refs/tags/${{ inputs.tag }}"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            REF="${GITHUB_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Checkout (full history for git-cliff)
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Generate changelog (git-cliff)
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          name: ${{ steps.ref.outputs.tag }}
          body: ${{ steps.cliff.outputs.content }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256

  tap-bump:
    name: Bump Homebrew tap formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute source-tarball sha256
        id: sha
        env:
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          URL="https://github.com/jayakornk/kubectx-rs/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "$URL" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | awk '{print $1}')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Computed sha256 for ${TAG}: ${SHA}"

      - name: Checkout homebrew-tap (with PAT)
        uses: actions/checkout@v7
        with:
          repository: jayakornk/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Patch formula url + sha256
        env:
          URL: ${{ steps.sha.outputs.url }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cd tap
          F=Formula/kubectx-rs.rb
          sed -i "s|^  url \".*\"|  url \"${URL}\"|" "$F"
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" "$F"
          echo "=== proposed diff ==="
          git diff -- "$F"

      - name: Commit + push (only if changed)
        env:
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kubectx-rs.rb
          if git diff --cached --quiet; then
            echo "No formula changes (already at ${TAG}); nothing to push."
          else
            git commit -m "bump kubectx-rs to ${TAG}"
            git push
            echo "Pushed formula bump for ${TAG} to jayakornk/homebrew-tap."
          fi